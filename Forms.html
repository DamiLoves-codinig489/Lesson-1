    <h1>Personal Details Form</h1>

<input type="radio" id="male" name="gender" value="Male">Male<br>

<input type="checkbox" id="city" value="Korea">Korea<br>
<input type="checkbox" id="city" value="Japan">Japan<br>

</fieldset>
</form>
