<!DOCTYPE html>
<html>
    <body>
    <h2>JavaScript Array Method</h2>
    <h2>join() and pop()</h2>

    <p id="myjoin"></p>
    <p id="myfirstpop"></p>
    <p id="mysecondpop"></p>
    <script>
var juice = ["Coke", "Fanta", "Lemonade", "Sprite"];
document.getElementById("myjoin").innerHTML = juice.join(" * ");
document.getElementById("myfirstpop").innerHTML = juice;
juice.pop();
document.getElementById("mysecondpop").innerHTML = juice;
    </script>
    </body>
</html>
